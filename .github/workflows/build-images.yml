name: Build and Publish GIS Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: docker/pygeoapi
            tag: pygeoapi
          - context: docker/qgis
            tag: qgis
          - context: docker/worker
            tag: worker

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.tag }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/waystones:${{ matrix.tag }}-${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/waystones:${{ matrix.tag }}-latest
          push: true
          cache-from: type=gha,scope=${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.tag }}
