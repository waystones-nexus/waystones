services:
  pygeoapi:
    image: ghcr.io/henrik716/waystones-keystone:pygeoapi-latest
    ports:
      - "5000:5000"
    environment:
      # Point to your pygeoapi config file mounted below.
      PYGEOAPI_CONFIG: /pygeoapi/local.config.yml
      # Optional: base64-encode your config and pass it here instead of mounting.
      # PYGEOAPI_CONFIG_B64: <base64-encoded pygeoapi-config.yml>
    volumes:
      - ./pygeoapi-config.yml:/pygeoapi/local.config.yml:ro
      # For GeoPackage sources: mount your data directory
      # - ./data:/data:ro

  qgis:
    image: ghcr.io/henrik716/waystones-keystone:qgis-latest
    ports:
      - "8080:80"
    environment:
      QGIS_PROJECT_B64: ""  # base64-encoded .qgs project file
    profiles:
      - wms  # only started with: docker compose --profile wms up
